# Alembic config — миграции схемы PostgreSQL для kb-API.
#
# URL базы читается из env (`DATABASE_URL`) внутри alembic/env.py — здесь
# плейсхолдер, чтобы Alembic не падал при запуске без env.
#
# Запуск:
#   make migrate                 # upgrade head
#   make migrate-create m="..."  # autogenerate revision

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://kb:kb@localhost:5432/rehome_kb

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
